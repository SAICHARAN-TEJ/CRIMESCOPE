services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      # - neo4j       # Optional: uncomment if running with Neo4j
      - chromadb
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./data/mem0:/app/data/mem0
    restart: unless-stopped

  # ── Frontend (Vue 3 + Vite → nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Marketing Website (static → nginx) ──────────────────────────────
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

  # ── Neo4j ────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/crimescope_password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped

  # ── ChromaDB ─────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    restart: unless-stopped


volumes:
  neo4j_data:
